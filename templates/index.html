<!DOCTYPE html>
<html>
<head>
    <title>Procesador DSL Médico</title>
    <style>
        body{
            font-family: Arial;
            padding:40px;
        }
        input{
            width:300px;
            padding:8px;
            margin:5px;
        }
        button{
            padding:10px;
        }
        .resultado{
            margin-top:20px;
            border:1px solid gray;
            padding:15px;
        }
    </style>
</head>
<body>
    <h1>Procesador DSL para Datos Médicos</h1>
    <form method="POST">
        <label>Nombre:</label>
        <br>
        <input
            type="text"
            name="nombre"
            required>
        <br><br>

        <label>Apellido:</label>
        <br>
        <input
            type="text"
            name="apellido"
            required>
        <br><br>

        <label>Edad:</label>
        <br>
        <input
            type="number"
            name="edad"
            required>
        <br><br>

        <label>DNI:</label>
        <br>
        <input
            type="text"
            name="dni"
            required>
        <br><br>

        <label>Diagnóstico:</label>
        <br>
        <input
            type="text"
            name="diagnostico"
            required>
        <br><br>

        <button type="submit">
            Validar
        </button>

    </form>
    {% if resultado %}
    <div class="resultado">
        {{ resultado|safe }}
    </div>
    {% endif %}
</body>
</html>
